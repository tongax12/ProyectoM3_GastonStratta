<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CharChat — Habla con tu ídolo</title>
  <meta name="description" content="Chatea con Messi, Djokovic, Shrek o Mike Wazowski. Una SPA hecha con HTML, CSS y JavaScript puro." />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <!-- Skip link para accesibilidad -->
  <a href="#main" class="skip-link">Saltar al contenido</a>

  <header class="app-header">
    <a href="/home" class="brand" data-link>
      <span class="brand-mark" aria-hidden="true">◎</span>
      <span class="brand-name">CharChat</span>
    </a>

    <nav class="main-nav" aria-label="Navegación principal">
      <a href="/home" class="nav-link" data-link data-route="home">Inicio</a>
      <a href="/chat" class="nav-link" data-link data-route="chat">Chat</a>
      <a href="/about" class="nav-link" data-link data-route="about">Acerca de</a>
    </nav>
  </header>

  <main id="main" class="app-main">
    <!-- Las vistas se montan acá dinámicamente -->
    <div id="view-root"></div>
  </main>

  <nav class="tab-bar" aria-label="Navegación móvil">
    <a href="/home" class="tab-link" data-link data-route="home">
      <span class="tab-icon" aria-hidden="true">⌂</span>
      <span>Inicio</span>
    </a>
    <a href="/chat" class="tab-link" data-link data-route="chat">
      <span class="tab-icon" aria-hidden="true">◔</span>
      <span>Chat</span>
    </a>
    <a href="/about" class="tab-link" data-link data-route="about">
      <span class="tab-icon" aria-hidden="true">ⓘ</span>
      <span>Acerca de</span>
    </a>
  </nav>

  <!-- Templates de cada vista: contenido fuente que el router clona -->
  <template id="tpl-home"></template>
  <template id="tpl-chat"></template>
  <template id="tpl-about"></template>

  <script type="module" src="/main.js"></script>
</body>
</html>
