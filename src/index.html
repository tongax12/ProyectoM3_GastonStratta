<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CharChat — Habla con tu ídolo</title>
  <meta name="description" content="Chatea con Messi, Djokovic, Shrek o Mike Wazowski. Una SPA hecha con HTML, CSS y JavaScript puro." />
  <!--
    theme-init.js aplica el tema guardado ANTES de pintar la página, para
    que no se vea un flash del tema equivocado (ej: guardaste "dark" pero
    se ve claro por una fracción de segundo hasta que corre main.js).
    Sin type="module" a propósito: tiene que ejecutar de forma síncrona,
    antes del <link> de estilos.
  -->
  <script src="/theme-init.js"></script>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <!-- Skip link para accesibilidad -->
  <a href="#main" class="skip-link">Saltar al contenido</a>

  <header class="app-header">
    <a href="/home" class="brand" data-link>
      <span class="brand-mark" aria-hidden="true">◎</span>
      <span class="brand-name">CharChat</span>
    </a>

    <div class="header-actions">
      <nav class="main-nav" aria-label="Navegación principal">
        <a href="/home" class="nav-link" data-link data-route="home">Inicio</a>
        <a href="/chat" class="nav-link" data-link data-route="chat">Chat</a>
        <a href="/about" class="nav-link" data-link data-route="about">Acerca de</a>
      </nav>

      <button type="button" class="theme-toggle" data-theme-toggle aria-pressed="false" aria-label="Cambiar a modo oscuro">
        <svg class="theme-toggle-icon icon-sun" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
        </svg>
        <svg class="theme-toggle-icon icon-moon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"></path>
        </svg>
      </button>
    </div>
  </header>

  <main id="main" class="app-main">
    <!-- Las vistas se montan acá dinámicamente -->
    <div id="view-root"></div>
  </main>

  <nav class="tab-bar" aria-label="Navegación móvil">
    <a href="/home" class="tab-link" data-link data-route="home">
      <span class="tab-icon" aria-hidden="true">⌂</span>
      <span>Inicio</span>
    </a>
    <a href="/chat" class="tab-link" data-link data-route="chat">
      <span class="tab-icon" aria-hidden="true">◔</span>
      <span>Chat</span>
    </a>
    <a href="/about" class="tab-link" data-link data-route="about">
      <span class="tab-icon" aria-hidden="true">ⓘ</span>
      <span>Acerca de</span>
    </a>
  </nav>

  <!-- Templates de cada vista: contenido fuente que el router clona -->
  <template id="tpl-home"></template>
  <template id="tpl-chat"></template>
  <template id="tpl-about"></template>

  <script type="module" src="/main.js"></script>
</body>
</html>
